<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Flotsam. — Studio de montage vidéo, Paris</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; min-height: 100vh; background: #1A1C22; color: #FEFEFE; overflow-x: hidden; }
  a { color: inherit; }
  ::selection { background: #772CE8; color: #FEFEFE; }

  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: #151720; }
  ::-webkit-scrollbar-thumb { background: #33353F; border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover { background: #772CE8; }

  /* Keyframes */
  @keyframes fpBlink    { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  @keyframes fpPulse    { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(2);opacity:0} }
  @keyframes fpScrollHint {
    0%   { transform: translateY(-16px); opacity: 0; }
    40%  { opacity: 1; }
    100% { transform: translateY(16px);  opacity: 0; }
  }

  /* Responsive breakpoint for the client grid (used by SocialProof) */
  @media (max-width: 1100px) {
    .fp-client-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
  }
  @media (max-width: 600px) {
    .fp-client-grid { grid-template-columns: 1fr !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="./src/primitives.jsx"></script>
<script type="text/babel" src="./src/WaveBackground.jsx"></script>
<script type="text/babel" src="./src/Nav.jsx"></script>
<script type="text/babel" src="./src/Hero.jsx"></script>
<script type="text/babel" src="./src/SocialProof.jsx"></script>
<script type="text/babel" src="./src/Projects.jsx"></script>
<script type="text/babel" src="./src/Creations.jsx"></script>
<script type="text/babel" src="./src/FAQ.jsx"></script>
<script type="text/babel" src="./src/Contact.jsx"></script>
<script type="text/babel" src="./src/Footer.jsx"></script>

<script type="text/babel" data-type="module">
  import { SpeedInsights } from 'https://unpkg.com/@vercel/speed-insights@2.0.0/dist/react/index.mjs';

  function App() {
    const jump = (id) => {
      if (id === 'hero') {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      const el = document.getElementById(id);
      if (el) {
        const y = el.getBoundingClientRect().top + window.scrollY - 60;
        window.scrollTo({ top: y, behavior: 'smooth' });
      }
    };
    const bookCall = () => jump('contact');

    return (
      <>
        <Nav onJumpTo={jump} onBookCall={bookCall} />
        <main>
          <Hero onBookCall={bookCall} onJumpTo={jump} />
          <SocialProof />
          <Projects />
          <Creations />
          <FAQ />
          <Contact />
        </main>
        <Footer onJumpTo={jump} />
        <SpeedInsights />
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
